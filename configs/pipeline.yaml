# Pipeline configuration
whisper:
  # Model size: tiny | base | small | medium | large-v3
  # → "medium" cho chất lượng tốt, tiếng Việt chính xác (~769 MB RAM)
  # → "large-v3" cho chất lượng cao nhất (~1.5 GB RAM)
  model: "medium"

openai:
  model: "gpt-4o-mini"

clips:
  min_duration: 15.0   # seconds
  max_duration: 90.0   # seconds
  max_count: 10

output:
  video_dir: "data/videos"
  clip_dir: "data/clips"
  subtitle_dir: "data/subtitles"
